name: launch_quality_mobile
description: Launch Quality native Flutter app — iPhone, Android, Windows, and Chrome against Railway API.
publish_to: "none"
version: 1.1.1+3

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  http: ^1.2.2
  go_router: ^14.6.2
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  intl: ^0.20.2
  fl_chart: ^0.70.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

  flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/logo.png
  adaptive_icon_background: "#F8F9FF"
  adaptive_icon_foreground: assets/logo.png
  min_sdk_android: 21
  web:
    generate: true
    image_path: assets/logo.png
    background_color: "#F8F9FF"
    theme_color: "#00639A"
  windows:
    generate: true
    image_path: assets/logo.png
    icon_size: 256

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
