services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - najjar_mongo:/data/db
    ports:
      - "27017:27017"

  mongo-express:
    image: mongo-express:1
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo
      ME_CONFIG_BASICAUTH: "false"

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/najjar_auto_ads
      JWT_SECRET: najjar-dev-secret-key-2026-min16
      CORS_ORIGIN: http://localhost:3000,http://127.0.0.1:3000
      DEMO_ADMIN_EMAIL: admin@najjar.om
      DEMO_ADMIN_PASSWORD: Najjar2026!

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:4000/api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:8080"

volumes:
  najjar_mongo:
