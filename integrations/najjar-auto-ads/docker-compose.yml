services:
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      NAJJAR_DATA_DIR: /app/data
      JWT_SECRET: najjar-dev-secret-key-2026-min16
      CORS_ORIGIN: http://localhost:3000,http://127.0.0.1:3000
      DEMO_ADMIN_EMAIL: admin@najjar.om
      DEMO_ADMIN_PASSWORD: Najjar2026!
    volumes:
      - najjar_data:/app/data

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:4000/api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:8080"

volumes:
  najjar_data:
