<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Launch Quality Staff</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Tajawal", "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #040914, #071426 52%, #0b1220);
      color: #f6f2e8;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 420px;
      border: 1px solid rgba(216, 177, 91, 0.35);
      border-radius: 24px;
      padding: 28px;
      background: rgba(255, 255, 255, 0.06);
    }
    h1 { margin: 0 0 8px; color: #fff1b8; font-size: 1.4rem; }
    p { margin: 0 0 16px; color: #a9b3c5; line-height: 1.7; }
    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(216, 177, 91, 0.18);
      border: 1px solid rgba(216, 177, 91, 0.45);
      color: #fff1b8;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }
    a {
      color: #f6d77f;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <section class="card">
    <div class="badge">Launch Quality Staff</div>
    <h1>جاري فتح النظام…</h1>
    <p>
      إذا لم يفتح التطبيق تلقائياً، افتح لوحة التحكم من
      <a id="openLink" href="https://web-production-08d73.up.railway.app">الرابط الإنتاجي</a>.
    </p>
  </section>
  <script>
    const API_BASE = "https://web-production-08d73.up.railway.app";
    const target = API_BASE + "/";
    document.getElementById("openLink").href = target;
    setTimeout(() => { window.location.replace(target); }, 600);
  </script>
</body>
</html>
