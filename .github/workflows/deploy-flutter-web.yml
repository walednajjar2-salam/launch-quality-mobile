name: Deploy Flutter Web to Railway
# Requires repository secret: RAILWAY_TOKEN

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'lib/**'
      - 'web/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'Dockerfile'
      - 'nginx.conf'
      - 'railway.toml'
      - '.github/workflows/deploy-flutter-web.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::warning::RAILWAY_TOKEN secret is not configured — skipping deploy."
            echo "Add it in GitHub → Settings → Secrets and variables → Actions → New repository secret"
            exit 0
          fi
          railway up --detach --service "${RAILWAY_FLUTTER_SERVICE:-Launch-Quality-Mobile}" \
            -p "${RAILWAY_PROJECT_ID:-9239907c-96e9-4763-b2d3-2d57931f7bba}" \
            -e "${RAILWAY_ENVIRONMENT:-production}"
