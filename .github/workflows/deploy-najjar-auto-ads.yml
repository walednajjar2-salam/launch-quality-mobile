name: Deploy NAJJAR Auto Ads to Railway

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'integrations/najjar-auto-ads/**'
      - 'scripts/deploy-najjar-auto-ads.sh'
      - '.github/workflows/deploy-najjar-auto-ads.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy NAJJAR Auto Ads (MongoDB + API + Web)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          NAJJAR_JWT_SECRET: ${{ secrets.NAJJAR_JWT_SECRET }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::warning::RAILWAY_TOKEN not set — skipping NAJJAR deploy"
            exit 0
          fi
          chmod +x scripts/deploy-najjar-auto-ads.sh
          bash scripts/deploy-najjar-auto-ads.sh
