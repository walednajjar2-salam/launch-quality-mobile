app = "jawdah-cloud"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  JAWDAH_HOST = "0.0.0.0"
  JAWDAH_DATA_DIR = "/data"

[mounts]
  source = "jawdah_data"
  destination = "/data"

[[services]]
  internal_port = 8765
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
